{% extends "base.html" %}
{% block title %}{{ i18n.settings_general }} — 3DFilamentManagement{% endblock %}

{% block content %}
<header class="content-header">
    <h2 style="color:var(--text-primary);font-size:1.3rem;">{{ i18n.settings_general }}</h2>
</header>
<div class="content-body">
    <div class="settings-card">
        <h3><i class="fas fa-sliders-h"></i> {{ i18n.nav_general }}</h3>
        <div class="form-group">
            <label>{{ i18n.settings_threshold }}</label>
            <input type="number" class="form-control" id="thresholdInput" min="50" step="10" value="200">
        </div>
        <div class="form-group">
            <label>{{ i18n.settings_default_weight }}</label>
            <input type="number" class="form-control" id="defaultWeightInput" min="100" step="50" value="1000">
        </div>
        <div class="form-group">
            <label>⚙️ {{ i18n.settings_lang_label }} / System Language</label>
            <select class="form-control" id="systemLanguage">
                <option value="zh">{{ i18n.lang_zh }} (Chinese)</option>
                <option value="en">English (US)</option>
            </select>
        </div>
        <div style="display:flex;gap:1rem;margin-top:1.2rem;">
            <button class="btn btn-primary" id="saveSettingsBtn"><i class="fas fa-save"></i> {{ i18n.btn_save }}</button>
            <button class="btn btn-cancel" id="resetSettingsBtn"><i class="fas fa-undo"></i> {{ i18n.btn_reset }}</button>
        </div>
        <div id="settingsMsg" style="margin-top:0.8rem;display:none;"></div>
    </div>
</div>
{% endblock %}

{% block page_js %}
<script src="/static/js/settings.js"></script>
{% endblock %}
