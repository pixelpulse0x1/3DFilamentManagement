{% extends "base.html" %}
{% block title %}常规设置 — 3DFilamentManagement{% endblock %}

{% block content %}
<header class="content-header">
    <h2 style="color:var(--text-primary);font-size:1.3rem;">常规设置</h2>
</header>
<div class="content-body">
    <div class="settings-card">
        <h3><i class="fas fa-sliders-h"></i> 常规</h3>
        <div class="form-group">
            <label>耗材预警阈值 (g)</label>
            <input type="number" class="form-control" id="thresholdInput" min="50" step="10" value="200">
        </div>
        <div class="form-group">
            <label>新添耗材默认初始重量 (g)</label>
            <input type="number" class="form-control" id="defaultWeightInput" min="100" step="50" value="1000">
        </div>
        <div style="display:flex;gap:1rem;margin-top:1.2rem;">
            <button class="btn btn-primary" id="saveSettingsBtn"><i class="fas fa-save"></i> 保存设置</button>
            <button class="btn btn-cancel" id="resetSettingsBtn"><i class="fas fa-undo"></i> 恢复默认</button>
        </div>
        <div id="settingsMsg" style="margin-top:0.8rem;display:none;"></div>
    </div>
</div>
{% endblock %}

{% block page_js %}
<script src="/static/js/settings.js"></script>
{% endblock %}
