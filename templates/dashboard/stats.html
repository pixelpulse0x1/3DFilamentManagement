{% extends "base.html" %}
{% block title %}统计报表 — 3D耗材库存管理系统{% endblock %}

{% block content %}
<header class="content-header">
    <h2 style="color:var(--text-primary);font-size:1.3rem;">统计报表</h2>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-outline" id="refreshBtn">
            <i class="fas fa-sync-alt"></i> 刷新数据
        </button>
    </div>
</header>

<div class="content-body">
    <div class="dashboard-grid">
        <div class="card">
            <div class="card-header"><div class="card-title">耗材类型分布</div></div>
            <div class="chart-container"><canvas id="materialChartReports"></canvas></div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">库存状态分析</div></div>
            <div class="chart-container"><canvas id="statusChartReports"></canvas></div>
        </div>
    </div>
    <div class="card" style="margin-top:1rem;">
        <div class="card-header"><div class="card-title">月度耗材使用量</div></div>
        <div class="chart-container"><canvas id="usageChart"></canvas></div>
    </div>
</div>
{% endblock %}
