{% extends "base.html" %}
{% block title %}使用记录 — 3DFilamentManagement{% endblock %}

{% block content %}
<header class="content-header">
    <h2 style="color:var(--text-primary);font-size:1.3rem;">使用记录</h2>
</header>

<div class="content-body">
    <div class="card">
        <div class="card-header"><div class="card-title">耗材使用记录</div></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>日期时间</th><th>耗材名称</th><th>使用重量(g)</th>
                        <th>使用金额(¥)</th><th>备注</th><th style="width:120px;">操作</th>
                    </tr>
                </thead>
                <tbody id="usageTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 编辑备注模态框 -->
<div class="modal" id="editRemarkModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">编辑备注</div>
            <div class="close-modal">&times;</div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>耗材: <span id="editRemarkFilament"></span></label>
            </div>
            <div class="form-group">
                <label>备注内容</label>
                <input type="text" class="form-control" id="editRemarkInput" placeholder="输入备注信息">
            </div>
            <div style="display:flex;gap:1rem;margin-top:1.2rem;">
                <button class="btn btn-primary" id="saveRemarkBtn" style="flex:1;"><i class="fas fa-save"></i> 保存备注</button>
            </div>
            <div id="editRemarkMsg" style="margin-top:0.8rem;display:none;"></div>
        </div>
    </div>
</div>
{% endblock %}
