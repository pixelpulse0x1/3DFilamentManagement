{% extends "base.html" %}
{% block title %}库存总览 — 3DFilamentManagement{% endblock %}

{% block content %}
<header class="content-header">
    <h2 style="color:var(--text-primary);font-size:1.3rem;">库存总览</h2>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div class="status-radio-group" id="filterStatusGroup">
            <label class="status-radio active"><input type="radio" name="filterStatus" value="all" checked> 全部</label>
            <label class="status-radio"><input type="radio" name="filterStatus" value="remaining"> 剩余</label>
            <label class="status-radio"><input type="radio" name="filterStatus" value="used"> 已使用</label>
        </div>
    </div>
</header>

<div class="content-body">
    <div class="dashboard-grid" id="statsGrid">
        <div class="card">
            <div class="card-header"><div class="card-title">总耗材数量</div><div class="card-icon icon-primary"><i class="fas fa-boxes"></i></div></div>
            <div class="stat-value">0</div><div class="stat-label">卷</div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">耗材类型</div><div class="card-icon icon-primary"><i class="fas fa-layer-group"></i></div></div>
            <div class="stat-value">0</div><div class="stat-label">种材料类型</div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">库存预警</div><div class="card-icon icon-warning"><i class="fas fa-exclamation-triangle"></i></div></div>
            <div class="stat-value">0</div><div class="stat-label">卷耗材需要补充</div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">常用耗材</div><div class="card-icon icon-primary"><i class="fas fa-star"></i></div></div>
            <div class="stat-value">0</div><div class="stat-label">标记为常用</div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-title">累计购入价值</div><div class="card-icon icon-primary"><i class="fas fa-yen-sign"></i></div></div>
            <div class="stat-value">¥0</div><div class="stat-label">财务维度总投入</div>
        </div>
    </div>

    <!-- 总使用重量 + 剩余重量 -->
    <div class="usage-weight-row">
        <div class="card weight-stat-card">
            <div class="card-header">
                <div class="card-title">总使用重量</div>
                <div class="card-icon" style="background:rgba(247,37,133,0.15);color:var(--warning);">
                    <i class="fas fa-weight-hanging"></i>
                </div>
            </div>
            <div class="stat-value mono" id="totalUsedWeight">0.00g</div>
            <div class="stat-label">历史累计消耗总克数</div>
        </div>
        <div class="card weight-stat-card">
            <div class="card-header">
                <div class="card-title">剩余重量</div>
                <div class="card-icon" style="background:rgba(76,201,240,0.15);color:var(--success);">
                    <i class="fas fa-scale-balanced"></i>
                </div>
            </div>
            <div class="stat-value mono" id="remainingTotalWeight">0.00g</div>
            <div class="stat-label">全量可用耗材实存净重之和</div>
        </div>
    </div>

    <div class="alert alert-warning" id="lowStockAlert" style="display:flex;">
        <i class="fas fa-exclamation-circle"></i>
        <div id="lowStockMessage"></div>
    </div>

    

    <div class="card" style="margin-top:1rem;margin-bottom:1rem;">
        <div class="card-header"><div class="card-title">厂商耗材统计</div></div>
        <div class="manufacturers-grid" id="manufacturerGrid"></div>
    </div>
</div>
{% endblock %}
