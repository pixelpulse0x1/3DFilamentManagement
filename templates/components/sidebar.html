<script>
(function() {
    function toggleAccordion(btn, childrenId, storageKey) {
        const children = document.getElementById(childrenId);
        if (children) {
            children.classList.toggle('open');
            btn.classList.toggle('expanded');
            localStorage.setItem(storageKey, children.classList.contains('open') ? '1' : '0');
        }
    }

    document.querySelectorAll('.nav-parent').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            toggleAccordion(this, this.dataset.target + 'Children', 'accordion_' + this.dataset.target);
        });
    });

    document.querySelectorAll('.nav-subparent').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            toggleAccordion(this, this.dataset.target + 'Grandchildren', 'accordion_sub_' + this.dataset.target);
        });
    });

    // Restore accordion state from localStorage
    function restoreState(key, childrenId, parentSelector) {
        const stored = localStorage.getItem(key);
        if (stored !== null) {
            const children = document.getElementById(childrenId);
            const parent = document.querySelector(parentSelector);
            if (children && parent) {
                if (stored === '1') {
                    children.classList.add('open');
                    parent.classList.add('expanded');
                } else {
                    children.classList.remove('open');
                    parent.classList.remove('expanded');
                }
            }
        }
    }

    document.querySelectorAll('.nav-group').forEach(group => {
        restoreState('accordion_' + group.dataset.group, group.dataset.group + 'Children', `.nav-parent[data-target="${group.dataset.group}"]`);
    });
    document.querySelectorAll('.nav-subgroup').forEach(group => {
        restoreState('accordion_sub_' + group.dataset.subgroup, group.dataset.subgroup + 'Grandchildren', `.nav-subparent[data-target="${group.dataset.subgroup}"]`);
    });
})();
</script>
