<script>
(function() {
    const groups = document.querySelectorAll('.nav-parent');
    groups.forEach(parent => {
        parent.addEventListener('click', function(e) {
            e.preventDefault();
            const target = this.dataset.target;
            const children = document.getElementById(target + 'Children');
            const arrow = this.querySelector('.accordion-arrow');
            if (children) {
                children.classList.toggle('open');
                this.classList.toggle('expanded');
            }
            localStorage.setItem('accordion_' + target, children && children.classList.contains('open') ? '1' : '0');
        });
    });

    // Restore accordion state from localStorage
    document.querySelectorAll('.nav-group').forEach(group => {
        const groupName = group.dataset.group;
        const stored = localStorage.getItem('accordion_' + groupName);
        if (stored !== null) {
            const children = document.getElementById(groupName + 'Children');
            const parent = group.querySelector('.nav-parent');
            if (children && parent) {
                if (stored === '1') {
                    children.classList.add('open');
                    parent.classList.add('expanded');
                } else {
                    children.classList.remove('open');
                    parent.classList.remove('expanded');
                }
            }
        }
    });
})();
</script>
