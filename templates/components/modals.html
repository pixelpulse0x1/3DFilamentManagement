<!-- 添加/编辑耗材模态框 -->
<div class="modal" id="addModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">添加新耗材</div>
            <div class="close-modal">&times;</div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>耗材名称 *</label>
                <input type="text" class="form-control" id="filamentName" placeholder="例如: PLA高级白" required>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>材料类型 *</label>
                    <select class="form-control" id="materialType"></select>
                </div>
                <div class="form-group">
                    <label>生产厂商</label>
                    <select class="form-control" id="manufacturer"></select>
                </div>
            </div>
            <div class="form-group">
                <label>颜色 *</label>
                <div class="color-grid" id="presetColors"></div>
                <div class="custom-color-container">
                    <span class="custom-color-label">自定义:</span>
                    <input type="color" class="form-control" id="colorPicker" value="#4361ee" style="flex:1;min-height:40px;">
                    <div class="color-preview" id="colorPreview" style="width:40px;height:40px;"></div>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>存储位置</label>
                    <input type="text" class="form-control" id="location" placeholder="例如: A区-3层">
                </div>
                <div class="form-group">
                    <label>耗材状态</label>
                    <select class="form-control" id="filamentStatus">
                        <option value="全新" selected>全新</option>
                        <option value="闲置">闲置</option>
                        <option value="上机">上机</option>
                        <option value="用尽">用尽</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>初始重量 (g) *</label>
                    <input type="number" class="form-control" id="initialWeight" min="1" step="1" required>
                </div>
                <div class="form-group">
                    <label>当前重量 (g) *</label>
                    <input type="number" class="form-control" id="currentWeight" min="0" step="1" required>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>购买日期</label>
                    <input type="date" class="form-control" id="purchaseDate">
                </div>
                <div class="form-group">
                    <label>购买价格 (¥)</label>
                    <input type="number" class="form-control" id="purchasePrice" min="0" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label>购买渠道</label>
                <select class="form-control" id="purchaseChannel">
                    <option value="">请选择</option>
                    <option value="京东">京东</option><option value="淘宝">淘宝</option>
                    <option value="拼多多">拼多多</option><option value="小程序">小程序</option>
                    <option value="咸鱼">咸鱼</option><option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group" id="openedAtGroup" style="display:none;">
                <label>开封日期</label>
                <input type="date" class="form-control" id="openedAt">
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="isFavorite"> 标记为常用耗材</label>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1.2rem;">
                <button class="btn btn-primary" id="saveFilamentBtn" style="flex:1;"><i class="fas fa-save"></i> 保存耗材</button>
            </div>
        </div>
    </div>
</div>

<!-- 批量添加模态框 -->
<div class="modal" id="batchAddModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">批量添加耗材</div>
            <div class="close-modal">&times;</div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>材料类型 *</label>
                <select class="form-control" id="batchMaterialType"></select>
            </div>
            <div class="form-group">
                <label>颜色 *</label>
                <div class="color-grid" id="batchPresetColors"></div>
                <div class="custom-color-container">
                    <span class="custom-color-label">自定义:</span>
                    <input type="color" class="form-control" id="batchColorPicker" value="#4361ee" style="flex:1;min-height:40px;">
                    <div class="color-preview" id="batchColorPreview" style="width:40px;height:40px;"></div>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>生产厂商</label>
                    <select class="form-control" id="batchManufacturer"></select>
                </div>
                <div class="form-group">
                    <label>存储位置</label>
                    <input type="text" class="form-control" id="batchLocation" placeholder="例如: A区-3层">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>初始重量 (g) *</label>
                    <input type="number" class="form-control" id="batchInitialWeight" min="1" step="1" required>
                </div>
                <div class="form-group">
                    <label>数量 *</label>
                    <input type="number" class="form-control" id="batchQuantity" value="1" min="1" step="1" required>
                </div>
            </div>
            <div class="form-group">
                <label>名称前缀 *</label>
                <input type="text" class="form-control" id="batchNamePrefix" placeholder="例如: PLA高级白" required>
                <small>名称将自动添加序号，如: PLA高级白 #1</small>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>购买日期</label>
                    <input type="date" class="form-control" id="batchPurchaseDate">
                </div>
                <div class="form-group">
                    <label>购买价格 (¥)</label>
                    <input type="number" class="form-control" id="batchPurchasePrice" min="0" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label>购买渠道</label>
                <select class="form-control" id="batchPurchaseChannel">
                    <option value="">请选择</option>
                    <option value="京东">京东</option><option value="淘宝">淘宝</option>
                    <option value="拼多多">拼多多</option><option value="小程序">小程序</option>
                    <option value="咸鱼">咸鱼</option><option value="其他">其他</option>
                </select>
            </div>
            <div style="display:flex;gap:1rem;margin-top:1.2rem;">
                <button class="btn btn-primary" id="saveBatchBtn" style="flex:1;"><i class="fas fa-save"></i> 批量添加</button>
            </div>
        </div>
    </div>
</div>

<!-- 使用耗材模态框 -->
<div class="modal" id="useModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">使用耗材</div>
            <div class="close-modal">&times;</div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label id="useFilamentName">PLA高级白</label>
                <input type="number" class="form-control" id="usedWeight" placeholder="输入使用重量 (克)" min="1" step="1" required>
                <small>当前剩余重量: <span id="currentWeightDisplay">850</span>g</small>
            </div>
            <div class="form-group">
                <label>备注信息</label>
                <input type="text" class="form-control" id="useNote" placeholder="输入备注（例如：打印了什么模型）">
            </div>
            <div style="display:flex;gap:1rem;margin-top:1.2rem;">
                <button class="btn btn-primary" id="confirmUseBtn" style="flex:1;"><i class="fas fa-check"></i> 确认使用</button>
            </div>
        </div>
    </div>
</div>

<!-- 耗材详情模态框 -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">耗材详情</div>
            <div class="close-modal">&times;</div>
        </div>
        <div class="modal-body">
            <div class="detail-grid">
                <div class="detail-item"><div class="detail-label">耗材名称</div><div class="detail-value" id="detailName">-</div></div>
                <div class="detail-item"><div class="detail-label">材料类型</div><div class="detail-value" id="detailMaterial">-</div></div>
                <div class="detail-item"><div class="detail-label">颜色</div><div class="detail-value detail-color"><div class="detail-color-preview" id="detailColorPreview" style="background-color:#f0f0f0;"></div><span id="detailColor">-</span></div></div>
                <div class="detail-item"><div class="detail-label">厂商</div><div class="detail-value" id="detailManufacturer">-</div></div>
                <div class="detail-item"><div class="detail-label">当前重量</div><div class="detail-value" id="detailCurrentWeight">-</div></div>
                <div class="detail-item"><div class="detail-label">初始重量</div><div class="detail-value" id="detailInitialWeight">-</div></div>
                <div class="detail-item"><div class="detail-label">购买日期</div><div class="detail-value" id="detailPurchaseDate">-</div></div>
                <div class="detail-item"><div class="detail-label">购买价格</div><div class="detail-value" id="detailPurchasePrice">-</div></div>
                <div class="detail-item"><div class="detail-label">购买渠道</div><div class="detail-value" id="detailPurchaseChannel">-</div></div>
                <div class="detail-item"><div class="detail-label">开封状态</div><div class="detail-value" id="detailOpenedStatus">-</div></div>
                <div class="detail-item"><div class="detail-label">开封日期</div><div class="detail-value" id="detailOpenedDate">-</div></div>
                <div class="detail-item"><div class="detail-label">存储位置</div><div class="detail-value" id="detailLocation">-</div></div>
                <div class="detail-item"><div class="detail-label">使用进度</div><div class="detail-value"><div id="detailProgressText">-</div><div class="detail-progress"><div class="detail-progress-fill" id="detailProgressBar" style="width:0%"></div></div></div></div>
                <div class="detail-item"><div class="detail-label">状态</div><div class="detail-value"><span class="detail-status status-in-use" id="detailStatus">-</span></div></div>
            </div>
        </div>
    </div>
</div>
