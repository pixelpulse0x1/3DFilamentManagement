<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}3DFilamentManagement{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="3DFilamentManagement" />
    <link rel="manifest" href="/static/site.webmanifest" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="{{ 'has-background' if active_background }}" style="{{ 'background-image: url(/uploads/backgrounds/' + active_background + ')' if active_background }}">
    <div class="app-layout">
        {% include 'components/sidebar.html' %}
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% include 'components/modals.html' %}

    <script src="/static/js/app.js"></script>
    {% block page_js %}{% endblock %}
</body>
</html>
