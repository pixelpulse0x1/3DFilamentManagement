{% extends "base.html" %}
{% block title %}类型管理 — 3DFilamentManagement{% endblock %}

{% block content %}
<header class="content-header">
    <h2 style="color:var(--text-primary);font-size:1.3rem;">耗材类型管理</h2>
</header>
<div class="content-body">
    <div class="mgmt-header">
        <span style="color:var(--text-secondary);">管理所有耗材材料类型</span>
        <button class="btn btn-primary" id="addMaterialBtn"><i class="fas fa-plus"></i> 添加类型</button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>材料名称</th>
                    <th>描述</th>
                    <th style="width:160px;">操作</th>
                </tr>
            </thead>
            <tbody id="materialsTableBody">
                <tr><td colspan="4"><div class="empty-state"><i class="fas fa-layer-group"></i><p>加载中...</p></div></td></tr>
            </tbody>
        </table>
    </div>

    <div id="materialError" style="display:none;margin-top:1rem;" class="alert alert-warning"></div>
</div>

<!-- 添加/编辑材料模态框 -->
<div class="modal" id="materialModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="materialModalTitle">添加材料类型</div>
            <div class="close-modal" id="closeMaterialModal">&times;</div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>材料名称 *</label>
                <input type="text" class="form-control" id="materialName" placeholder="例如: PLA Basic" required>
            </div>
            <div class="form-group">
                <label>描述</label>
                <input type="text" class="form-control" id="materialDescription" placeholder="可选的描述信息">
            </div>
            <div style="display:flex;gap:1rem;margin-top:1.2rem;">
                <button class="btn btn-primary" id="saveMaterialBtn" style="flex:1;"><i class="fas fa-save"></i> 保存</button>
                <button class="btn btn-cancel" id="cancelMaterialBtn" style="flex:1;">取消</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block page_js %}
<script src="/static/js/materials.js"></script>
{% endblock %}
