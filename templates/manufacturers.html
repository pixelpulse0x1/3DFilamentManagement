{% extends "base.html" %}
{% block title %}品牌管理 — 3DFilamentManagement{% endblock %}

{% block content %}
<header class="content-header">
    <h2 style="color:var(--text-primary);font-size:1.3rem;">耗材品牌管理</h2>
</header>
<div class="content-body">
    <div class="mgmt-header">
        <span style="color:var(--text-secondary);">管理所有耗材生产品牌</span>
        <button class="btn btn-primary" id="addManufacturerBtn"><i class="fas fa-plus"></i> 添加品牌</button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>品牌名称</th>
                    <th>网址</th>
                    <th style="width:160px;">操作</th>
                </tr>
            </thead>
            <tbody id="manufacturersTableBody">
                <tr><td colspan="4"><div class="empty-state"><i class="fas fa-tag"></i><p>加载中...</p></div></td></tr>
            </tbody>
        </table>
    </div>

    <div id="manufacturerError" style="display:none;margin-top:1rem;" class="alert alert-warning"></div>
</div>

<!-- 添加/编辑品牌模态框 -->
<div class="modal" id="manufacturerModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="manufacturerModalTitle">添加品牌</div>
            <div class="close-modal" id="closeManufacturerModal">&times;</div>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>品牌名称 *</label>
                <input type="text" class="form-control" id="manufacturerName" placeholder="例如: 拓竹" required>
            </div>
            <div class="form-group">
                <label>网址</label>
                <input type="text" class="form-control" id="manufacturerWebsite" placeholder="例如: https://www.bambulab.com">
            </div>
            <div style="display:flex;gap:1rem;margin-top:1.2rem;">
                <button class="btn btn-primary" id="saveManufacturerBtn" style="flex:1;"><i class="fas fa-save"></i> 保存</button>
                <button class="btn btn-cancel" id="cancelManufacturerBtn" style="flex:1;">取消</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block page_js %}
<script src="/static/js/manufacturers.js"></script>
{% endblock %}
